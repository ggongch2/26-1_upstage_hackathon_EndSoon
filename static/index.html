<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>STEM Textbook Translator</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --panel-2: #232730;
    --accent: #6fa8ff;
    --accent-2: #9b87ff;
    --text: #e6e9ef;
    --muted: #8a92a3;
    --border: #2c313c;
    --good: #5dd49b;
    --warn: #f4b860;
    --bad: #ff7676;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 28px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 13px; }
  header .badge {
    background: var(--panel-2);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    border: 1px solid var(--border);
  }
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 60px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 24px;
    text-align: center;
    transition: all 0.15s ease;
    cursor: pointer;
    background: var(--panel);
  }
  .drop.hover {
    border-color: var(--accent);
    background: var(--panel-2);
  }
  .drop input[type=file] { display: none; }
  .drop .icon { font-size: 32px; }
  .drop h2 { margin: 12px 0 4px; font-size: 16px; font-weight: 500; }
  .drop p { margin: 0; color: var(--muted); font-size: 13px; }
  .controls {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: var(--panel);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .controls label { font-size: 13px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .controls input[type=text] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    width: 220px;
    font-size: 13px;
  }
  button.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .stages { display: flex; gap: 10px; flex-wrap: wrap; }
  .stage {
    flex: 1;
    min-width: 140px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    display: flex; align-items: center; gap: 8px;
    color: var(--muted);
  }
  .stage .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  .stage.active { color: var(--text); border-color: var(--accent); }
  .stage.active .dot { background: var(--accent); box-shadow: 0 0 0 4px rgba(111,168,255,0.18); animation: pulse 1.2s infinite; }
  .stage.done { color: var(--good); border-color: rgba(93,212,155,0.3); }
  .stage.done .dot { background: var(--good); }
  @keyframes pulse { 50% { box-shadow: 0 0 0 8px rgba(111,168,255,0); } }
  .results { display: none; }
  .results.visible { display: grid; gap: 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card h3 { margin: 0 0 12px; font-size: 14px; font-weight: 600; color: var(--accent); }
  .glossary table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .glossary th, .glossary td {
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .glossary th { color: var(--muted); font-weight: 500; }
  .glossary td:first-child { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--accent); }
  .downloads { display: flex; gap: 12px; flex-wrap: wrap; }
  .downloads a {
    background: var(--panel-2);
    color: var(--text);
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .downloads a:hover { border-color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; }
  .progress-wrap { display: flex; flex-direction: column; gap: 8px; }
  .progress-bar {
    width: 100%; height: 8px; background: var(--panel-2);
    border-radius: 999px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.3s ease;
  }
  .progress-meta {
    display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap;
    font-size: 13px;
  }
  #progressCount { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--accent); }
  .err {
    background: rgba(255,118,118,0.08);
    border-color: rgba(255,118,118,0.3);
    color: var(--bad);
  }
</style>
</head>
<body>
  <header>
    <h1>📘 STEM Textbook Translator</h1>
    <span class="sub">Upstage Document Parse · Solar LLM · n8n orchestration</span>
    <span class="badge" id="modeBadge">checking mode…</span>
  </header>

  <main>
    <label class="drop" id="drop">
      <input type="file" id="file" accept=".pdf" />
      <div class="icon">📄</div>
      <h2>PDF를 끌어다 놓거나 클릭해서 선택</h2>
      <p>이공계 영어 원서 PDF · 최대 ~100MB 권장</p>
    </label>

    <div class="controls">
      <label>제목 <input type="text" id="title" placeholder="(파일명 그대로 사용)" /></label>
      <label><input type="checkbox" id="wantPdf" /> PDF로도 출력</label>
      <button class="primary" id="go" disabled>번역 시작</button>
      <span class="meta" id="fileLabel"></span>
    </div>

    <div class="stages" id="stages">
      <div class="stage" data-k="upload"><span class="dot"></span><span>① 업로드</span></div>
      <div class="stage" data-k="parse"><span class="dot"></span><span>② Document Parse</span></div>
      <div class="stage" data-k="glossary"><span class="dot"></span><span>③ 용어집 추출</span></div>
      <div class="stage" data-k="translate"><span class="dot"></span><span>④ 번역</span></div>
      <div class="stage" data-k="docx"><span class="dot"></span><span>⑤ DOCX 조립</span></div>
      <div class="stage" data-k="pdf"><span class="dot"></span><span>⑥ PDF 변환</span></div>
    </div>

    <div class="card" id="progressCard" style="display:none">
      <h3 id="progressTitle">진행 중…</h3>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-meta">
          <span id="progressCount">0 / 0</span>
          <span class="meta" id="progressMessage"></span>
          <span class="meta" id="progressElapsed"></span>
        </div>
      </div>
    </div>

    <div class="results" id="results">
      <div class="card">
        <h3>처리 결과</h3>
        <div class="meta" id="summary"></div>
        <div class="downloads" id="downloads"></div>
      </div>
      <div class="card glossary">
        <h3>추출된 용어집 (2-Pass 일관성 적용)</h3>
        <table>
          <thead><tr><th>English</th><th>Korean</th></tr></thead>
          <tbody id="glossaryBody"></tbody>
        </table>
      </div>
    </div>
  </main>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const fileLabel = document.getElementById('fileLabel');
const goBtn = document.getElementById('go');
const titleInput = document.getElementById('title');
const wantPdf = document.getElementById('wantPdf');
const stages = document.getElementById('stages');
const results = document.getElementById('results');
const summary = document.getElementById('summary');
const downloads = document.getElementById('downloads');
const glossaryBody = document.getElementById('glossaryBody');
const modeBadge = document.getElementById('modeBadge');

let chosen = null;

fetch('/mode').then(r => r.json()).then(d => {
  modeBadge.textContent = d.mock ? 'MOCK 모드 (API 미연결)' : 'LIVE 모드';
  modeBadge.style.color = d.mock ? 'var(--warn)' : 'var(--good)';
});

['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('hover');
}));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('hover');
}));
drop.addEventListener('drop', e => {
  if (e.dataTransfer.files[0]) handlePick(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handlePick(e.target.files[0]);
});

function handlePick(f) {
  chosen = f;
  fileLabel.textContent = `${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`;
  goBtn.disabled = false;
}

function resetStages() {
  for (const el of stages.querySelectorAll('.stage')) el.classList.remove('active','done');
  results.classList.remove('visible');
  progressFill.style.width = '0%';
  progressCount.textContent = '0 / 0';
  progressMessage.textContent = '';
  progressElapsed.textContent = '';
}

const STAGE_ORDER = ['upload','parse','glossary','translate','docx','pdf'];
const STAGE_LABEL = {
  upload: '업로드',
  parse: 'Document Parse 호출',
  glossary: '용어집 추출',
  translate: '요소별 번역',
  docx: 'Word 문서 조립',
  pdf: 'PDF 변환',
};

const progressCard = document.getElementById('progressCard');
const progressTitle = document.getElementById('progressTitle');
const progressFill = document.getElementById('progressFill');
const progressCount = document.getElementById('progressCount');
const progressMessage = document.getElementById('progressMessage');
const progressElapsed = document.getElementById('progressElapsed');

function applyStageState(currentStage) {
  const curIdx = STAGE_ORDER.indexOf(currentStage);
  for (const el of stages.querySelectorAll('.stage')) {
    const k = el.dataset.k;
    const idx = STAGE_ORDER.indexOf(k);
    el.classList.remove('active','done');
    if (idx < curIdx) el.classList.add('done');
    else if (idx === curIdx) el.classList.add('active');
  }
}

function fmtElapsed(sec) {
  if (sec == null) return '';
  sec = Math.floor(sec);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? `${m}분 ${s}초` : `${s}초`;
}

async function pollProgress(jobId) {
  while (true) {
    let snap;
    try {
      const r = await fetch(`/jobs/${jobId}/progress`);
      if (!r.ok) throw new Error(`progress ${r.status}`);
      snap = await r.json();
    } catch (err) {
      throw new Error('진행 상황 조회 실패: ' + err.message);
    }

    if (snap.stage === 'done') {
      applyStageState('pdf');
      for (const el of stages.querySelectorAll('.stage')) el.classList.add('done');
      progressFill.style.width = '100%';
      progressCount.textContent = `${snap.total} / ${snap.total}`;
      progressMessage.textContent = '완료';
      progressElapsed.textContent = `걸린 시간: ${fmtElapsed(snap.elapsed)}`;
      return snap.result;
    }
    if (snap.stage === 'error') {
      throw new Error(snap.error || '알 수 없는 오류');
    }

    applyStageState(snap.stage);
    const total = snap.total || 0;
    const done = snap.processed || 0;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    progressFill.style.width = (total > 0 ? pct : 5) + '%';
    progressCount.textContent = total > 0 ? `${done} / ${total} (${pct}%)` : '준비 중…';
    progressTitle.textContent = `진행 중 — ${STAGE_LABEL[snap.stage] || snap.stage}`;
    progressMessage.textContent = snap.message || '';
    progressElapsed.textContent = `${fmtElapsed(snap.elapsed)} 경과`;

    await new Promise(r => setTimeout(r, 500));
  }
}

goBtn.addEventListener('click', async () => {
  if (!chosen) return;
  resetStages();
  goBtn.disabled = true;
  progressCard.style.display = 'block';
  applyStageState('upload');

  const fd = new FormData();
  fd.append('file', chosen);
  if (titleInput.value) fd.append('title', titleInput.value);
  fd.append('want_pdf', wantPdf.checked ? 'true' : 'false');

  try {
    const submit = await fetch('/translate', { method: 'POST', body: fd });
    if (!submit.ok && submit.status !== 202) {
      throw new Error(`server ${submit.status}: ${await submit.text()}`);
    }
    const { job_id } = await submit.json();
    const result = await pollProgress(job_id);
    renderResults(result);
  } catch (err) {
    summary.innerHTML = `<span style="color: var(--bad)">실패: ${err.message}</span>`;
    results.classList.add('visible');
    downloads.innerHTML = '';
    glossaryBody.innerHTML = '';
  } finally {
    goBtn.disabled = false;
  }
});

function renderResults(data) {
  summary.textContent =
    `job ${data.job_id} · 요소 ${data.element_count}개 처리 · 용어 ${Object.keys(data.glossary||{}).length}개 추출`;
  downloads.innerHTML = '';
  if (data.download_docx) {
    const a = document.createElement('a');
    a.href = data.download_docx; a.textContent = '📝 DOCX 다운로드';
    downloads.appendChild(a);
  }
  if (data.download_pdf) {
    const a = document.createElement('a');
    a.href = data.download_pdf; a.textContent = '📕 PDF 다운로드';
    downloads.appendChild(a);
  }
  glossaryBody.innerHTML = '';
  const entries = Object.entries(data.glossary || {});
  if (entries.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan=2 class="meta">추출된 용어가 없습니다</td>';
    glossaryBody.appendChild(tr);
  }
  for (const [en, ko] of entries) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escapeHtml(en)}</td><td>${escapeHtml(ko)}</td>`;
    glossaryBody.appendChild(tr);
  }
  results.classList.add('visible');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
